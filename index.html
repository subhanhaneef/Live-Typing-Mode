<script>
    let text = "My name is subhan haneef";
    let i = 0;

                deleting=true;
            }
        }
        else{
demo.innerHTML=text.slice(0,i)
i--;
if(i<0){
    deleting=false;
    i=0;
}
        }setTimeout(typeEffect,100)
    }typeEffect();
</script>
